<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisy ui cdn-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind cdn -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f5f7] h-[100vh] flex justify-center items-center">
    <form class="bg-[#FFFFFF] rounded-2xl p-8 w-[350px]">
        <div>
            <label class="font-medium" for="">Mobile Number</label><br>
            <input type="text" placeholder="Enter your number" class="input mt-3 bg-[#f4f5f7] rounded-[32px]" />
        </div>
        <div class="mt-5">
            <label class="font-medium" for="">4 Digit Pin</label><br>
            <input type="text" placeholder="Enter 4 Digit Pin" class="input mt-3 bg-[#f4f5f7] rounded-[32px]" />
        </div>
        <button class="btn bg-[#0874F2] text-white mt-5 rounded-[32px] w-full ">Login</button>
    </form>
    
</body>
</html>
