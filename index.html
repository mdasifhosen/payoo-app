<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisy ui cdn-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind cdn -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- alert -->
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

      <!-- font awesome cdn -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>
<body class="bg-[#f4f5f7] h-[100vh] flex flex-col justify-center items-center">
    <div class="h-[130px] w-[300px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center">
        <img src="./assets/Group.png" alt="">
    </div>
    <form class="bg-[#FFFFFF] rounded-2xl p-8 w-[350px]">
        <div>
            <label class="font-medium" for="">Mobile Number</label><br>
            <input id="mobile-no" type="text" placeholder="Enter your number" class="input mt-3 bg-[#f4f5f7] rounded-[32px]" />
        </div>
        <div class="mt-5">
            <label class="font-medium" for="">4 Digit Pin</label><br>
            <input id="pin" type="text" placeholder="Enter 4 Digit Pin" class="input mt-3 bg-[#f4f5f7] rounded-[32px]" />
        </div>
        <button  class="btn bg-[#0874F2] text-white mt-5 rounded-[32px] w-full " id="loginButton">Login</button>
    </form>

    <!-- script -->

    <script src="./script.js"></script>
    
</body>
</html>
