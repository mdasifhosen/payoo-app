<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- daisy ui cdn-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind cdn -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- alert -->
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

      <!-- font awesome cdn -->
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#f4f5f7] h-[100vh] ">

   <div class="max-w-lg mx-auto bg-white rounded-b-xl">
     <div class=" min-h-[50px] flex justify-between items-center border-b-1 border-gray-400 p-3">

        <div class="flex justify-center items-center">
            <img class="h-[50px]" src="./assets/Group.png" alt="">
            <div class="ml-3">
                <h1 class="font-extrabold text-[18px]">$<span id="available-balance">45000</span>
                </h1>
                <p class="text-[#08080880] ">Available Balance</p>
            </div>

        </div>
        <div>
            <button id="logout-button" class="btn rounded-[8px] text-[#08080880]"><img src="./Frame.png" alt="">Log Out</button>
        </div>
    </div>


    <div class="mt-8 p-3">
        <h1 class="font-bold text-[#080808] text-[24px]">🔥 Welcome to Payooo!</h1>
        <p class="text-[#08080880] text-[16px]">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
    </div>

    <div class="min-h-[200px] grid grid-cols-3 gap-4 mt-6 p-3">
        <div id="add-button" class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/wallet1.png" alt="">
            <p class="text-center">Add Money</p>
        </div>

        <div id="cash-out-button" class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/send1.png" alt="">
            <p class="text-center">Cashout</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/money1.png" alt="">
            <p class="text-center">Transfer Money</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/bonus1.png" alt="">
            <p class="text-center">Get Bonus</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/purse1.png" alt="">
            <p class="text-center">Pay Bill</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/transaction1.png" alt="">
            <p class="text-center">Transactions</p>
        </div>
    </div>
   </div>

   <!-- form section -->
    <div class="all-form-sections max-w-lg mx-auto">
        <div id="add-money-parent">
            <h1 class="font-bold text-[18px] text-[#080808] my-5">Add Money</h1>
            <form class="bg-[#FFFFFF] rounded-2xl p-8">
                <div>
                    <h1  class="font-medium text-[16px]">Select A Bank</h1>
                    <select id="bank" class="select mt-3 bg-[#f4f5f7] rounded-3xl w-full">
                        <option value="" disabled selected>Bank</option>
            <option value="AB Bank">AB Bank</option>
            <option value="IFIC Bank">IFIC Bank</option>
            <option value="Dutch Bangla Bank">Dutch Bangla Bank</option>
                    </select>
                </div>

            <div class="mt-4">
                <label class="font-medium" for="">Bank Account Number</label><br>
                <input id="account-number" type="text" placeholder="Enter 11 digit account number" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>
            <div class="mt-4">
                <label class="font-medium" for="">Amount to Add</label><br>
                <input id="add-amount" type="text" placeholder="Add Amount to withdraw" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>
            <div class="mt-4">
                <label class="font-medium" for="">Pin Number</label><br>
                <input id="add-pin" type="text" placeholder="Enter 4 digit pin number" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>

           <button id="add-money-btn"  class="btn bg-[#0874F2] text-white mt-5 rounded-3xl w-full my-6">Add Money</button>
            </form>
        </div>

        <!-- cash out parent -->

        <div id="cash-out-parent" style="display: none;">
            <h1 class="font-bold text-[18px] text-[#080808] my-5">Cash Out</h1>

            <form class="bg-[#FFFFFF] rounded-2xl p-8">

            <div class="mt-4">
                <label class="font-medium" for="">Agent Number</label><br>
                <input id="agent-number" type="text" placeholder="Enter 11 digit number" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>
            <div class="mt-4">
                <label class="font-medium" for="">Amount</label><br>
                <input id="cash-amount" type="text" placeholder="Enter amount to withdraw" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>
            <div class="mt-4">
                <label class="font-medium" for="">Pin Number</label><br>
                <input id="cash-out-pin" type="text" placeholder="Enter 4 digit pin number" class="input mt-3 bg-[#f4f5f7] rounded-3xl w-full" />
           </div>

           <button id="add-money-btn"  class="btn bg-[#0874F2] text-white mt-5 rounded-3xl w-full my-6">Withdraw Money</button>
            </form>
        </div>
    </div>

    <script src="./home.js"></script>
</body>
</html>
