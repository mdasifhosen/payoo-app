<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

    <!-- daisy ui cdn-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind cdn -->

<body class="bg-[#f4f5f7] h-[100vh] ">

   <div class="max-w-lg mx-auto bg-white rounded-b-xl">
     <div class=" min-h-[50px] flex justify-between items-center border-b-1 border-gray-400 p-3">

        <div class="flex justify-center items-center">
            <img class="h-[50px]" src="./assets/Group.png" alt="">
            <div class="ml-3">
                <h1 class="font-extrabold text-[18px]">$<span>45000</span>
                </h1>
                <p class="text-[#08080880] ">Available Balance</p>

        </div>
        <div>
            <button class="btn rounded-[8px] text-[#08080880]"><img src="./Frame.png" alt="">Log Out</button>
        </div>
    </div>


    <div class="mt-8 p-3">

        <p class="text-[#08080880] text-[16px]">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="rounded-xl border-2 border-gray-300 p-3">

        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/money1.png" alt="">

        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/bonus1.png" alt="">
            <p class="text-center">Get Bonus</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/purse1.png" alt="">
            <p class="text-center">Pay Bill</p>
        </div>

        <div class="rounded-xl border-2 border-gray-300 p-3">
            <img class="mx-auto" src="./assets/transaction1.png" alt="">
            <p class="text-center">Transactions</p>
        </div>
